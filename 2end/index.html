<script type="text/javascript">
function gate(){
   // ▼ユーザの入力を求める
   var UserInput = prompt("担当教師名","");
   // ▼入力内容をチェック
   if( /\W+/g.test(UserInput) ) {
      // ▼半角英数字以外の文字が存在したらエラー
      alert("Some letters are not supported.");
   }
   // ▼キャンセルをチェック
   else if( UserInput != null ) {
      // ▼入力内容からファイル名を生成して移動
      location.href = UserInput + ".html";
   }
}
</script>

<body>
<title>TeX緑会</title>
<h1>TeX緑会</h1>
<br>
<p>下のPASS欄に、古文の担当教師の苗字をアルファベットで入れよ。例：麻原先生→asahara</p>
  <input type="button" value="PASS" onclick="gate();">
</body>
