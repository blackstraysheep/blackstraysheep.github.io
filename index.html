<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="blackstraysheep.github.io/index.css">
<script type="text/javascript">
function gate(){
   // ▼ユーザの入力を求める
   var UserInput = prompt("Enter Pass","");
   // ▼入力内容をチェック
   if( /\W+/g.test(UserInput) ) {
      // ▼半角英数字以外の文字が存在したらエラー
      alert("Some letters are not supported.");
   }
   // ▼キャンセルをチェック
   else if( UserInput != null ) {
      // ▼入力内容からファイル名を生成して移動
      location.href = UserInput + ".html";
   }
}
</script>
</head>
<body>
<title>TeX緑会</title>
<h1>TeX緑会</h1>
<br>
<div class="studytex">TeXを使えないなど、チンパンジー以下。これからの人生を考えれば、定期考査など些事です。24時間365.25日TeXの勉強をしなさい。</div>
<br>
<br>
<div class="weight300"> 無断ダウンロード厳禁　Do not download without permission.</div>
<button onclick="window.open('bluecheet')"><font size="6"  face="ＭＳ 明朝">青チート</font></button>
<button onclick="window.open('littlesheeps')"><font size="6"  face="ＭＳ 明朝">子羊のための部屋</font></button> 　  
<input type="button" value="PASS" onclick="gate();">
</body>
</html>
