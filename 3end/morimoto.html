<h1>
古文の部屋
</h1>
<br>
<p>
　このおとど達、とりどりにこそありしかども、みな大和心猛くおはしまして、ほかのおとどの眠きにえ堪えず、まどろみなどしけるを、かたはらいたくぞ見たまひつつ、さなる折にも、いにしへの文など、御学問したまひて、もののためしにて、いみじき点数取りたまひしぞかし。
</p>
